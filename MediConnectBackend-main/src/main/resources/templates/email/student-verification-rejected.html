<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; padding: 0; background: #fff7f7; font-family: Arial, sans-serif; color: #1f2937; }
        .wrap { max-width: 680px; margin: 24px auto; background: #ffffff; border: 1px solid #fde2e2; border-radius: 12px; overflow: hidden; }
        .head { padding: 28px; background: linear-gradient(135deg, #b91c1c, #ea580c); color: #fff; }
        .body { padding: 24px 28px; line-height: 1.7; }
        .warn { margin-top: 14px; padding: 14px; border-radius: 10px; background: #fee2e2; border: 1px solid #fecaca; }
        .foot { padding: 18px 28px 28px; font-size: 12px; color: #64748b; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="head">
        <h2 style="margin:0;">Student Verification Update</h2>
    </div>
    <div class="body">
        <p>Hello <strong th:text="${fullName}">Student</strong>,</p>
        <p>We could not approve your verification request this time.</p>
        <div class="warn">
            <strong>Reason:</strong> <span th:text="${reason}">Verification requirements were not fully met.</span>
        </div>
        <p>You can submit a new request with an updated document.</p>
    </div>
    <div class="foot">MediConnect</div>
</div>
</body>
</html>
