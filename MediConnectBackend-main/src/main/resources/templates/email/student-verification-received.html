<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; padding: 0; background: #f4f8ff; font-family: Arial, sans-serif; color: #1f2937; }
        .wrap { max-width: 680px; margin: 24px auto; background: #ffffff; border: 1px solid #dce7f5; border-radius: 12px; overflow: hidden; }
        .head { padding: 28px; background: linear-gradient(135deg, #0f766e, #0ea5e9); color: #fff; }
        .body { padding: 24px 28px; line-height: 1.7; }
        .box { margin-top: 14px; padding: 14px; border-radius: 10px; background: #eef6ff; border: 1px solid #bfd8f8; }
        .foot { padding: 18px 28px 28px; font-size: 12px; color: #64748b; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="head">
        <h2 style="margin:0;">Student Verification Received</h2>
    </div>
    <div class="body">
        <p>Hello <strong th:text="${fullName}">Student</strong>,</p>
        <p>Your verification request has been received successfully.</p>
        <div class="box">
            We are reviewing your document. Approval emails are sent after the minimum review waiting period.
        </div>
        <p>You can follow status updates from your verification request page.</p>
    </div>
    <div class="foot">MediConnect</div>
</div>
</body>
</html>
