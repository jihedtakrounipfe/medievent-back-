services:
  mysql:
    container_name: MediConnectMySQL
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: mediconnect_db
      MYSQL_USER: mediconnect_user
      MYSQL_PASSWORD: mediconnect_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - mediconnect_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    container_name: MediConnectKeycloak
    image: quay.io/keycloak/keycloak:25.0.5
    ports:
      - "9090:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

      KC_DB: mysql
      KC_DB_URL_HOST: mysql
      KC_DB_URL_PORT: 3306
      KC_DB_URL_DATABASE: keycloak_db
      KC_DB_USERNAME: mediconnect_user
      KC_DB_PASSWORD: mediconnect_pass

      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    command:
      - start-dev
      - --import-realm
    volumes:
      - ./keycloak-export:/opt/keycloak/data/import
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mediconnect_net
    restart: unless-stopped

  phpmyadmin:
    container_name: MediConnectPhpMyAdmin
    image: phpmyadmin:latest
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: mediconnect_user
      PMA_PASSWORD: mediconnect_pass
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mediconnect_net
    restart: unless-stopped

