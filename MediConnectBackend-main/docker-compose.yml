  backend:
    container_name: MediConnectBackend
    build: .
    ports:
      - "8080:8082"
    environment:
      - SERVER_PORT=8082
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/mediconnect_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - KEYCLOAK_SERVER_URL=http://keycloak:8080
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://keycloak:8080/realms/${KEYCLOAK_REALM}
      - SPRING_MAIL_USERNAME=${MAIL_USERNAME}
      - SPRING_MAIL_PASSWORD=${MAIL_PASSWORD}
      - RECAPTCHA_ENABLED=${RECAPTCHA_ENABLED:-false}
      - RECAPTCHA_SECRET_KEY=${RECAPTCHA_SECRET_KEY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - AI_RISK_SCORER_ENABLED=${AI_RISK_SCORER_ENABLED:-false}
      - FACE_RECOGNITION_ENABLED=${FACE_RECOGNITION_ENABLED:-false}
      - MEDICONNECT_UPLOAD_IMAGE_PATH=/app/uploads
      - INVOICE_STORAGE_PATH=/app/invoices
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./invoices:/app/invoices
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy
      keycloak:
        condition: service_started
#      ai-services:
#        condition: service_healthy
    networks:
      - mediconnect_net
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  mediconnect_net:
