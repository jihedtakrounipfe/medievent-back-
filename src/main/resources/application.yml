spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    default-encoding: UTF-8

mediconnect:
  upload:
    image-path: C:\Users\amine\Desktop\MediConnect\Images
  mail:
    from-name: MediConnect
    from-address: ${MAIL_USERNAME:}
    enabled: true
