# ?????????????????????????????????????????????????????????????
# APPLICATION
# ?????????????????????????????????????????????????????????????
spring.application.name=MediConnectBackend
server.port=8080
server.servlet.context-path=/mediconnect

# ?????????????????????????????????????????????????????????????
# DATABASE ? XAMPP MySQL (localhost)
# ?????????????????????????????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/mediconnect_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool (HikariCP ? Spring Boot default)
spring.datasource.hikari.pool-name=MediConnectPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ?????????????????????????????????????????????????????????????
# JPA / HIBERNATE
# ?????????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ?????????????????????????????????????????????????????????????
# SECURITY ? AES-256 Encryption Key
# Generate your own: openssl rand -base64 32
# ?????????????????????????????????????????????????????????????
mediconnect.encryption.aes-key=AqV+xwNIVavDKsfj9KdbulKf9gdMhzgxbJKNeJDLJco=

# ?????????????????????????????????????????????????????????????
# SECURITY ? Keycloak / JWT (fill in when Keycloak is ready)
# ?????????????????????????????????????????????????????????????
#spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/mediconnect

# ?????????????????????????????????????????????????????????????
# BIOMETRIC MICROSERVICE
# ?????????????????????????????????????????????????????????????
mediconnect.face-recognition.service-url=http://localhost:8000

# ?????????????????????????????????????????????????????????????
# FILE UPLOAD (for biometric photo endpoint)
# ?????????????????????????????????????????????????????????????
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ?????????????????????????????????????????????????????????????
# ASYNC (used by AuditLogService)
# ?????????????????????????????????????????????????????????????
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=mediconnect-async-

# ?????????????????????????????????????????????????????????????
# LOGGING
# ?????????????????????????????????????????????????????????????
logging.level.com.mediconnect=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE