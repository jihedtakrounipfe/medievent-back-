# =============================================================
# APPLICATION
# =============================================================
spring.application.name=MediConnectBackend
server.port=8082
server.servlet.context-path=/mediconnect

spring.config.import=optional:file:./.env[.properties]

# =============================================================
# DATABASE - XAMPP MySQL
# =============================================================
spring.datasource.url=jdbc:mysql://${HOST:localhost}:3307/mediconnect_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:mediconnect_user}
spring.datasource.password=${DB_PASSWORD:mediconnect_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool (HikariCP - Spring Boot default)
spring.datasource.hikari.pool-name=MediConnectPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# =============================================================
# JPA / HIBERNATE
# =============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =============================================================
# SECURITY - AES-256 Encryption Key
# =============================================================
mediconnect.encryption.aes-key=${AES_KEY:AqV+xwNIVavDKsfj9KdbulKf9gdMhzgxbJKNeJDLJco=}

# =============================================================
# SECURITY - Keycloak / JWT
# =============================================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://${HOST:localhost}:9090/realms/${KEYCLOAK_REALM:mediconnect-main}

keycloak.server-url=http://${HOST:localhost}:9090
keycloak.realm=${KEYCLOAK_REALM:mediconnect-main}
keycloak.client-id=${KEYCLOAK_CLIENT_ID:angular-spa}
keycloak.admin.realm=master
keycloak.admin.client-id=admin-cli
keycloak.admin.username=${KEYCLOAK_ADMIN_USERNAME:admin}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:admin}

# =============================================================
# BIOMETRIC MICROSERVICE
# =============================================================
mediconnect.face-recognition.service-url=http://${HOST:localhost}:8000

# =============================================================
# FILE UPLOAD
# =============================================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# =============================================================
# ASYNC (used by AuditLogService)
# =============================================================
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=mediconnect-async-

# =============================================================
# KAFKA CONFIGURATION
# =============================================================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=mediconnect-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# =============================================================
# MAIL (SMTP) — set MAIL_USERNAME + MAIL_PASSWORD in your .env
# =============================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=raouftakrouni0@gmail.com
spring.mail.password=rbpntoqbmsopysva
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# MediConnect mail settings
mediconnect.mail.from-name=${MAIL_FROM_NAME:MediConnect}
mediconnect.mail.from-address=${MAIL_USERNAME:noreply@mediconnect.tn}
mediconnect.mail.enabled=${MAIL_ENABLED:true}

# Frontend base URL (used in email CTA buttons)
mediconnect.app.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:4200}

# DEBUG LOGGING
logging.level.org.springframework.security=DEBUG
logging.level.skylinkers.tn.mediconnectbackend=DEBUG
