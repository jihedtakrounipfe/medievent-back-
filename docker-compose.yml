services:
  mysql:
    container_name: MediConnectMySQL
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: mediconnect_db
      MYSQL_USER: mediconnect_user
      MYSQL_PASSWORD: mediconnect_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - mediconnect_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    container_name: MediConnectKeycloak
    image: quay.io/keycloak/keycloak:25.0.5
    ports:
      - "9090:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

      KC_DB: mysql
      KC_DB_URL_HOST: mysql
      KC_DB_URL_PORT: 3306
      KC_DB_URL_DATABASE: keycloak_db
      KC_DB_USERNAME: mediconnect_user
      KC_DB_PASSWORD: mediconnect_pass

      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    command:
      - start-dev
      - --import-realm
    volumes:
      - ./keycloak-export:/opt/keycloak/data/import
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mediconnect_net
    restart: unless-stopped

  phpmyadmin:
    container_name: MediConnectPhpMyAdmin
    image: phpmyadmin:latest
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: mediconnect_user
      PMA_PASSWORD: mediconnect_pass
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mediconnect_net
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: MediConnectZookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - mediconnect_net

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: MediConnectKafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - mediconnect_net

  backend:
    container_name: MediConnectBackend
    build: .
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/mediconnect_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=mediconnect_user
      - SPRING_DATASOURCE_PASSWORD=mediconnect_pass
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KEYCLOAK_SERVER_URL=http://keycloak:8080
      - KEYCLOAK_REALM=mediconnect-main
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://keycloak:8080/realms/mediconnect-main
      - MEDICONNECT_FACE_RECOGNITION_SERVICE_URL=http://host.docker.internal:8000
      - MAIL_USERNAME=raouftakrouni0@gmail.com
      - MAIL_PASSWORD=ygcn uenj clwq hhhd
    volumes:
      - ./uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
      keycloak:
        condition: service_started
    networks:
      - mediconnect_net
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  mediconnect_net: